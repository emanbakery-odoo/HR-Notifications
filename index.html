        const toastIcon = document.getElementById('toastIcon');
        
        let isExecuting = false;

        // --- 3. EXECUTION LOGIC ---
        triggerBtn.addEventListener('click', async () => {
            if (isExecuting) return;
            
            // Set loading state
            isExecuting = true;
            btnText.classList.add('opacity-0');
            btnLoader.classList.remove('hidden');
            triggerBtn.classList.add('scale-95');

            try {
                // Send command
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors" // Required for Google Scripts
                });
                
                // Simulate slight delay for UX (since no-cors resolves almost instantly)
                await new Promise(r => setTimeout(r, 800));
                
                showToast('Script executed successfully!', 'success');
            } catch (error) {
                console.error("Error:", error);
                showToast('Failed to connect to script.', 'error');
            } finally {
                // Reset loading state
                isExecuting = false;
                btnText.classList.remove('opacity-0');
                btnLoader.classList.add('hidden');
                triggerBtn.classList.remove('scale-95');
            }

        const iconUrl = 'data:image/svg+xml;base64,' + btoa(svgIcon);

            short_name: "Trigger",
            description: "A fast way to execute Google Apps Script",
            start_url: window.location.href,
            display: "standalone",
            background_color: "#0f172a",
            theme_color: "#0f172a",

        };

            self.addEventListener('install', (e) => { self.skipWaiting(); });

                // Minimal fetch listener to ensure PWA installability criteria is met
                e.respondWith(fetch(e.request).catch(() => new Response("Offline")));
            });
        `;
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                .catch(err => console.log('PWA SW registration failed:', err));
        }

        // --- 6. PWA INSTALL PROMPT LOGIC ---
        let deferredPrompt;
        const installPwaBtn = document.getElementById('installPwaBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            installPwaBtn.classList.remove('hidden');
        });

        installPwaBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installPwaBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // Hide install button if already running as standalone app
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installPwaBtn.classList.add('hidden');
        }
    </script>
